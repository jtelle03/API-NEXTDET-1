ProductoEnergiaSolicitud:
  type: object
  properties:
    id:
      type: integer
      example: 1
    codigo:
      type: string
      example: "PES-0001"
    nombre_cliente:
      type: string
      example: "Juan Pérez"
    modo_solicitud:
      type: string
      example: "Email"
    email:
      type: string
      example: "juan.perez@example.com"
    telefono:
      type: string
      example: "987654321"
    mensaje:
      type: string
      example: "Me interesa una cotización para paneles solares."
    venta_monto:
      type: number
      example: 1500.50
    venta_fecha:
      type: string
      format: date
      example: "2023-10-27"
    venta_comentario:
      type: string
      example: "Venta cerrada exitosamente."
    idioma:
      type: string
      example: "es"
    estado:
      type: integer
      example: 1
    estado_nombre:
      type: string
      example: "Pendiente"
    fecha_creacion:
      type: string
      format: date-time
      example: "2023-10-27 10:00:00"
    historial_solicitud:
      type: array
      items:
        $ref: "#/ProductoEnergiaSolicitudHistorial"
    items:
      type: array
      items:
        $ref: "#/ProductoEnergiaSolicitudItem"

ProductoEnergiaSolicitudItem:
  type: object
  properties:
    producto_energia_id:
      type: integer
      example: 1
    titulo:
      type: string
      example: "Panel Solar 100W"
    titulo_en:
      type: string
      example: "Solar Panel 100W"
    cantidad:
      type: integer
      example: 5
    subtotal:
      type: number
      example: 750.25

ProductoEnergiaSolicitudHistorial:
  type: object
  properties:
    id:
      type: integer
      example: 1
    estado:
      type: integer
      example: 1
    estado_nombre:
      type: string
      example: "Pendiente"
    comentario:
      type: string
      example: "Comentario del historial"
    fecha_creacion:
      type: string
      format: date-time
      example: "2023-10-27 10:00:00"